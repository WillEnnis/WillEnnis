name: Generate contribution snake

# Builds the snake animation that eats your contribution graph and pushes the
# SVGs to the `output` branch, where the README pulls them from.
on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # NOTE: '#' in a query string MUST be URL-encoded as %23, or the SVG
          # bakes invalid CSS colors and the snake/dots render black.
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2364ffda&color_dots=%23161b22,%2330363d,%23484f58,%23636c76,%238b949e
            dist/github-snake.svg?palette=github-light&color_snake=%230a7ea4&color_dots=%23ebedf0,%23c6e6ee,%237fcadd,%2335a9c9,%230a7ea4

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
